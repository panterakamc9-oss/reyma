<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INVENTARIOSPRO | Reyma Industrial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --nav-bg: #0b1a30; --accent: #0056b3; --white: #ffffff; }
        body { margin: 0; display: flex; height: 100vh; background: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        aside { width: 250px; background: var(--nav-bg); color: white; padding: 20px; }
        .logo { width: 120px; margin-bottom: 40px; }
        nav div { padding: 12px; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        nav div:hover { color: white; background: rgba(255,255,255,0.1); border-radius: 8px; }
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; height: 300px; }
    </style>
</head>
<body>
    <aside>
        <img src="https://www.reyma.com.mx/wp-content/themes/reyma/assets/img/logo.png" class="logo" alt="Reyma">
        <nav>
            <div>Dashboard</div>
            <div>Productos</div>
            <div>Movimientos</div>
            <div>Configuración</div>
        </nav>
    </aside>
    <main>
        <div class="kpi-grid">
            <div class="card"><small>Total Productos</small><h2 id="kpi-prod">--</h2></div>
            <div class="card"><small>Stock Crítico</small><h2 id="kpi-crit">--</h2></div>
            <div class="card"><small>Entradas</small><h2 id="kpi-ent">--</h2></div>
            <div class="card"><small>Salidas</small><h2 id="kpi-sal">--</h2></div>
        </div>
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </main>

    <script>
        const supabase = supabase.createClient('https://wepsvgqdctsgtnizhbvc.supabase.co', 'TU_ANON_KEY_AQUI');

        async function init() {
            try {
                const { data, error } = await supabase.rpc('get_dashboard_stats');
                if (error) throw error;
                
                document.getElementById('kpi-prod').innerText = data.total_productos;
                document.getElementById('kpi-crit').innerText = data.stock_bajo;
                document.getElementById('kpi-ent').innerText = data.total_entradas;
                document.getElementById('kpi-sal').innerText = data.total_salidas;

                drawChart(data);
            } catch (e) { console.error(e); }
        }

        function drawChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            ctx.fillStyle = "#0056b3";
            ctx.fillRect(50, 200, 50, -data.total_entradas * 20);
            ctx.fillStyle = "#dc2626";
            ctx.fillRect(150, 200, 50, -data.total_salidas * 20);
        }

        init();
    </script>
</body>
</html>
