<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INVENTARIOSPRO | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 250px; background: #1a2b4a; color: white; padding: 20px; }
        .main { flex: 1; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="sidebar"><h2>INVENTARIOSPRO</h2></div>
    <div class="main">
        <div class="card">
            <h3>Dashboard</h3>
            <p id="status">Conectando...</p>
            <div id="stats"></div>
        </div>
    </div>
    <script>
        // CONFIGURACIÓN: Sustituye con tus valores reales
        const supabase = supabase.createClient('TU_URL', 'TU_ANON_KEY');

        async function loadData() {
            const status = document.getElementById('status');
            try {
                const { data, error } = await supabase.rpc('get_dashboard_stats');
                if (error) throw error;
                status.innerText = "Conexión exitosa";
                document.getElementById('stats').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }
        loadData();
    </script>
</body>
</html>
