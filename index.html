<script>
        const supabase = supabase.createClient(
            'https://wepsvgqdctsgtnizhbvc.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlcHN2Z3FkY3RzZ3RuaXpoYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTYxMTMsImV4cCI6MjA5OTIzMjExM30.Sce0_kT7eT1AGy-o_-7w4t_Rq9TowBHDN-dWK8nmEOA'
        );

        async function init() {
            // Referencia a los elementos
            const totalProd = document.getElementById('total-prod');
            
            try {
                console.log("Intentando ejecutar get_dashboard_stats...");
                
                const { data, error } = await supabase.rpc('get_dashboard_stats');
                
                if (error) {
                    // Si falla, mostramos el error directamente en la tarjeta
                    console.error("Error Supabase:", error);
                    totalProd.innerText = "Error: " + error.code;
                    totalProd.title = error.message; // Pasa el mouse sobre el texto para ver el error
                    return;
                }
                
                console.log("Datos obtenidos:", data);
                
                // Si llegamos aquí, los datos existen
                document.getElementById('total-prod').innerText = data.total_productos || 0;
                document.getElementById('stock-crit').innerText = data.stock_bajo || 0;
                document.getElementById('total-ent').innerText = data.total_entradas || 0;
                document.getElementById('total-sal').innerText = data.total_salidas || 0;

            } catch (err) {
                totalProd.innerText = "Error en JS";
                console.error("Error inesperado:", err);
            }
        }

        init();
    </script>
