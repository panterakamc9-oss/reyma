<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTARIOSPRO | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); border-left: 4px solid #3b82f6; }
        .active-item { background: rgba(255,255,255,0.1); border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col p-6">
        <div class="text-white text-2xl font-bold mb-10 tracking-tighter">Reyma<span class="text-blue-500">Pro</span></div>
        <nav class="flex-1 space-y-2">
            <div class="sidebar-item active-item p-3 cursor-pointer text-white rounded-r">Dashboard</div>
            <div class="sidebar-item p-3 cursor-pointer">Inventario</div>
            <div class="sidebar-item p-3 cursor-pointer">Reportes</div>
            <div class="sidebar-item p-3 cursor-pointer">Configuración</div>
        </nav>
        <div class="text-xs text-slate-500">v 2.0.4 - Enterprise</div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Panel de Control</h1>
                <p class="text-slate-500">Resumen operativo al instante</p>
            </div>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                + Nuevo Producto
            </button>
        </header>

        <!-- KPIS -->
        <div class="grid grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Productos</p>
                <div id="kpi-prod" class="text-3xl font-bold mt-2">--</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Stock Crítico</p>
                <div id="kpi-crit" class="text-3xl font-bold mt-2 text-red-500">--</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Entradas mes</p>
                <div id="kpi-ent" class="text-3xl font-bold mt-2 text-green-500">--</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Salidas mes</p>
                <div id="kpi-sal" class="text-3xl font-bold mt-2 text-amber-500">--</div>
            </div>
        </div>

        <!-- CONTENT GRID -->
        <div class="grid grid-cols-3 gap-8">
            <div class="col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="font-bold text-lg mb-4">Productos Activos</h3>
                <table class="w-full">
                    <thead><tr class="text-left text-slate-400 text-xs uppercase"><th class="pb-4">Producto</th><th class="pb-4">SKU</th><th class="pb-4">Stock</th><th class="pb-4">Estado</th></tr></thead>
                    <tbody id="prod-body"></tbody>
                </table>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="font-bold text-lg mb-4">Stock por Categoría</h3>
                <canvas id="inventoryChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        const supabase = supabase.createClient(
            'https://wepsvgqdctsgtnizhbvc.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlcHN2Z3FkY3RzZ3RuaXpoYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTYxMTMsImV4cCI6MjA5OTIzMjExM30.Sce0_kT7eT1AGy-o_-7w4t_Rq9TowBHDN-dWK8nmEOA'
        );

        async function init() {
            const { data: stats } = await supabase.rpc('get_dashboard_stats');
            document.getElementById('kpi-prod').innerText = stats.total_productos;
            document.getElementById('kpi-crit').innerText = stats.stock_bajo;
            document.getElementById('kpi-ent').innerText = stats.total_entradas;
            document.getElementById('kpi-sal').innerText = stats.total_salidas;

            const { data: prods } = await supabase.from('productos').select('*');
            const tbody = document.getElementById('prod-body');
            
            tbody.innerHTML = prods.map(p => {
                const isCrit = p.stock_actual <= p.stock_minimo;
                return `
                    <tr class="border-t border-slate-100 hover:bg-slate-50 transition">
                        <td class="py-4 font-medium">${p.nombre}</td>
                        <td class="text-slate-500 text-sm">${p.sku}</td>
                        <td class="font-bold">${p.stock_actual}</td>
                        <td>
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${isCrit ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                ${isCrit ? 'Bajo' : 'Óptimo'}
                            </span>
                        </td>
                    </tr>`;
            }).join('');

            new Chart(document.getElementById('inventoryChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Industrial', 'Eléctrico', 'Otros'],
                    datasets: [{ data: [15, 3, 5], backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'] }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }
        init();
    </script>
</body>
</html>
