<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENTARIOSPRO | Dashboard Empresarial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --sidebar: #1a2b4a; --bg: #f8fafc; --text-main: #1e293b; --accent: #0056b3; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text-main); }
        
        /* Sidebar Profesional */
        aside { width: 260px; background: var(--sidebar); color: white; padding: 30px; flex-shrink: 0; }
        h1.logo { font-size: 1.4rem; margin-bottom: 40px; color: #fff; letter-spacing: 1px; }
        nav div { padding: 12px 0; color: #94a3b8; font-weight: 500; cursor: pointer; transition: 0.3s; }
        nav div:hover { color: #fff; }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { margin-bottom: 30px; }
        .header h2 { font-size: 1.8rem; margin: 0; }
        
        /* Grid de KPIs */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .label { font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 10px; }
        .val { font-size: 2rem; font-weight: 800; color: var(--sidebar); }
    </style>
</head>
<body>
    <aside>
        <h1 class="logo">INVENTARIOSPRO</h1>
        <nav>
            <div>Dashboard</div>
            <div>Productos</div>
            <div>Movimientos</div>
            <div>Kardex</div>
            <div>Configuración</div>
        </nav>
    </aside>

    <main>
        <div class="header">
            <h2>Panel de Control Industrial</h2>
        </div>
        
        <div class="kpi-grid">
            <div class="card"><div class="label">Total Productos</div><div class="val" id="total-prod">--</div></div>
            <div class="card"><div class="label">Stock Crítico</div><div class="val" id="stock-crit">--</div></div>
            <div class="card"><div class="label">Entradas</div><div class="val" id="total-ent">--</div></div>
            <div class="card"><div class="label">Salidas</div><div class="val" id="total-sal">--</div></div>
        </div>
    </main>

    <script>
        const supabase = supabase.createClient(
            'https://wepsvgqdctsgtnizhbvc.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlcHN2Z3FkY3RzZ3RuaXpoYnZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTYxMTMsImV4cCI6MjA5OTIzMjExM30.Sce0_kT7eT1AGy-o_-7w4t_Rq9TowBHDN-dWK8nmEOA'
        );

        async function init() {
            try {
                const { data, error } = await supabase.rpc('get_dashboard_stats');
                if (error) throw error;
                
                // Actualización limpia
                document.getElementById('total-prod').innerText = data.total_productos;
                document.getElementById('stock-crit').innerText = data.stock_bajo;
                document.getElementById('total-ent').innerText = data.total_entradas;
                document.getElementById('total-sal').innerText = data.total_salidas;
            } catch (err) {
                console.error("Dashboard error:", err);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
